# =============================================================================
# Prefix: Ctrl+a (Ctrl+b is too far)
# =============================================================================
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# =============================================================================
# General
# =============================================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g base-index 1              # window index starts at 1
set -g mouse on                  # mouse support
set -g escape-time 10            # no ESC delay (for neovim)
set -g focus-events on           # neovim autoread
set -g status-position top       # status bar at top
set -g allow-rename off          # keep manual window names
set -g automatic-rename off      # don't auto-rename to running program
set -g detach-on-destroy off     # switch to other session on destroy
set -g pane-border-lines heavy          # thick pane borders
set -g pane-border-indicators off      # color full border, not half
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# =============================================================================
# Key Bindings
# =============================================================================
# intuitive split
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# window navigation
bind [ previous-window
bind ] next-window

# reload config
bind r source-file ~/.tmux.conf\; display-message "Config reloaded."

# session list sorted by time
bind s choose-tree -Zs -O time

# resize panes with hjkl (-r = repeatable)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z        # maximize toggle

# =============================================================================
# Vi Copy Mode
# =============================================================================
set -g mode-keys vi
bind y copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel \; run "tmux save-buffer - | pbcopy"
unbind -T copy-mode-vi MouseDragEnd1Pane

# =============================================================================
# Plugins (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'  # Ctrl+hjkl: nvim <-> tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'     # persist sessions
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto-save sessions

# Resurrect & Continuum
set -g @resurrect-capture-pane-contents 'on'     # save pane contents
set -g @continuum-restore 'on'                   # auto-restore on tmux start
set -g @continuum-save-interval '15'             # auto-save every 15 min
set -g @plugin 'sainnhe/tmux-fzf'                # fzf session/window search
# set -g @plugin 'catppuccin/tmux#v0.3.0'          # catppuccin theme
set -g @plugin 'janoamaral/tokyo-night-tmux'      # tokyo night theme

